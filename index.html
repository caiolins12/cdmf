<!doctype html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#7B1FA2" />
    <meta
      name="description"
      content="Centro de Dancas Marcelo Ferreira - Sistema de gestao de aulas de danca"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>CDMF</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/web-app-manifest-512x512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/web-app-manifest-192x192.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />

    <meta name="google" content="notranslate" />
    <meta name="application-name" content="CDMF" />
    <meta property="og:site_name" content="CDMF" />
    <meta property="og:title" content="CDMF" />
    <meta property="og:description" content="Centro de Danças Marcelo Ferreira - Sistema de gestão de aulas de dança" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cdmf.vercel.app/" />
    <meta name="google-site-verification" content="G2AauCro22D4KsXx2Ul1NmQBtwhDE4JqGsppfdywCeA" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://accounts.google.com" />

    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
      }

      html,
      body {
        overflow: hidden;
        position: fixed;
        inset: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
        background-color: #fff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      #root {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      .initial-loader {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }

      .initial-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .initial-loader .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top-color: #ffb300;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .initial-loader .text {
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
        margin-top: 16px;
        font-weight: 500;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      ::-webkit-scrollbar-track {
        background: #f1f5f9;
        border-radius: 8px;
      }

      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 8px;
        border: 2px solid #f1f5f9;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      * {
        scrollbar-width: thin;
        scrollbar-color: #cbd5e1 #f1f5f9;
        user-select: none;
        -webkit-user-select: none;
      }

      input, textarea, [contenteditable] {
        user-select: text;
        -webkit-user-select: text;
      }
    </style>
  </head>
  <body>
    <div class="initial-loader" id="initial-loader">
      <div class="spinner"></div>
      <div class="text">Carregando...</div>
    </div>

    <div id="root"></div>

    <script type="module" src="/index.ts"></script>
    <script>
      document.body.addEventListener(
        "touchmove",
        function (e) {
          if (e.target === document.body || e.target === document.documentElement) {
            e.preventDefault();
          }
        },
        { passive: false }
      );
    </script>
  </body>
</html>
